# wct configuration for this project
version: 1

# Base directory for worktrees
worktree_dir: "../worktrees"

# Project name (used for tmux session naming)
project_name: "wct"

# Files to copy to new worktree
copy:
  - .vscode/
  - .claude/

# Commands to run after worktree creation
setup:
  - name: "Mise trust"
    command: "mise trust mise.toml && mise install"
  - name: "Install dependencies"
    command: "bun install"

# IDE command
ide:
  name: vscode
  command: "code $WCT_WORKTREE_DIR --reuse-window"
  fork_workspace: true

# Tmux session configuration
tmux:
  windows:
    - name: "ai"
      command: "claude $WCT_PROMPT"
    - name: "dev"
      split: "vertical"
      panes:
        - command: "lazygit"
        - {}

profiles:
  codex:
    tmux:
      windows:
        - name: "ai"
          command: "codex $WCT_PROMPT"
        - name: "dev"
          split: "vertical"
          panes:
            - command: "lazygit"
            - {}
